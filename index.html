<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CA DMV Test Prep | הכנה לתאוריה קליפורניה</title>
<meta name="description" content="Practice for the California DMV written knowledge test with Hebrew explanations">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--surface:#131829;--surface2:#1a2038;--surface3:#222847;--accent:#6366f1;--accent2:#818cf8;--accent-glow:rgba(99,102,241,.15);--green:#22c55e;--green-bg:rgba(34,197,94,.12);--red:#ef4444;--red-bg:rgba(239,68,68,.12);--yellow:#eab308;--yellow-bg:rgba(234,179,8,.12);--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--radius:16px;--radius-sm:10px;--shadow:0 4px 24px rgba(0,0,0,.3);--font:'Inter',system-ui,sans-serif}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;line-height:1.5}
#app{max-width:800px;margin:0 auto;padding:16px;padding-bottom:100px}
.screen{display:none;animation:fadeIn .3s ease}.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.header{text-align:center;padding:24px 0 16px}
.header h1{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,var(--accent),#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:var(--text2);font-size:.9rem;margin-top:4px}
.logo{font-size:3rem;margin-bottom:8px}
.card{background:var(--surface);border:1px solid var(--surface3);border-radius:var(--radius);padding:20px;margin-bottom:12px;transition:all .2s ease;cursor:pointer;position:relative;overflow:hidden}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.card:active{transform:scale(.98)}
.card-icon{font-size:2rem;margin-bottom:8px}
.card h3{font-size:1.1rem;font-weight:700;margin-bottom:4px}
.card p{color:var(--text2);font-size:.85rem}
.card .badge{position:absolute;top:12px;right:12px;background:var(--accent-glow);color:var(--accent2);padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:600}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;border-radius:var(--radius-sm);font-family:var(--font);font-size:1rem;font-weight:600;border:none;cursor:pointer;transition:all .2s ease;text-decoration:none}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;box-shadow:0 4px 16px rgba(99,102,241,.3)}
.btn-primary:hover{box-shadow:0 6px 24px rgba(99,102,241,.4);transform:translateY(-1px)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--surface3)}
.btn-secondary:hover{border-color:var(--accent)}
.btn-sm{padding:8px 16px;font-size:.85rem;border-radius:8px}
.btn-block{width:100%}
.btn-back{background:none;border:none;color:var(--text2);font-size:.9rem;cursor:pointer;padding:8px 0;display:flex;align-items:center;gap:4px;font-family:var(--font)}
.btn-back:hover{color:var(--text)}
.progress-bar{width:100%;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;margin:12px 0}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),#a78bfa);border-radius:3px;transition:width .4s ease}
.options{display:flex;flex-direction:column;gap:10px;margin:16px 0}
.option{background:var(--surface2);border:2px solid var(--surface3);border-radius:var(--radius-sm);padding:14px 16px;cursor:pointer;transition:all .2s ease;font-size:.95rem;text-align:left;font-family:var(--font);color:var(--text);display:flex;align-items:center;gap:12px}
.option:hover:not(.disabled){border-color:var(--accent);background:var(--accent-glow)}
.option.selected{border-color:var(--accent);background:var(--accent-glow)}
.option.correct{border-color:var(--green)!important;background:var(--green-bg)!important}
.option.wrong{border-color:var(--red)!important;background:var(--red-bg)!important;animation:shake .4s ease}
.option.disabled{cursor:default;opacity:.7}
.option-letter{width:28px;height:28px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0}
.option.correct .option-letter{background:var(--green);color:#fff}
.option.wrong .option-letter{background:var(--red);color:#fff}
.explanation{background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--radius-sm);padding:16px;margin-top:16px;animation:slideUp .3s ease;direction:rtl;text-align:right}
.explanation h4{color:var(--accent2);font-size:.9rem;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.explanation p{color:var(--text2);font-size:.9rem;line-height:1.7}
.explanation .tip{margin-top:10px;padding:10px;background:var(--yellow-bg);border-radius:8px;color:var(--yellow);font-size:.85rem;font-weight:500}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:16px 0}
.stat-card{background:var(--surface);border:1px solid var(--surface3);border-radius:var(--radius-sm);padding:16px;text-align:center}
.stat-card .num{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-card .label{color:var(--text2);font-size:.8rem;margin-top:4px}
.categories{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}
.chip{padding:8px 16px;border-radius:20px;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s ease;border:1px solid var(--surface3);background:var(--surface);color:var(--text2)}
.chip:hover,.chip.active{background:var(--accent-glow);border-color:var(--accent);color:var(--accent2)}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.q-num{color:var(--text2);font-size:.85rem}
.q-cat{color:var(--accent2);font-size:.8rem;background:var(--accent-glow);padding:4px 12px;border-radius:20px}
.q-text{font-size:1.15rem;font-weight:600;line-height:1.6;margin-bottom:8px}
.result-circle{width:160px;height:160px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:24px auto;position:relative}
.result-circle.pass{background:var(--green-bg);border:3px solid var(--green)}
.result-circle.fail{background:var(--red-bg);border:3px solid var(--red)}
.result-circle .score{font-size:2.5rem;font-weight:900}
.result-circle.pass .score{color:var(--green)}
.result-circle.fail .score{color:var(--red)}
.result-circle .label{font-size:.85rem;color:var(--text2)}
.result-msg{text-align:center;font-size:1.3rem;font-weight:700;margin:16px 0}
.result-msg.pass{color:var(--green)}
.result-msg.fail{color:var(--red)}
.review-item{background:var(--surface);border:1px solid var(--surface3);border-radius:var(--radius-sm);padding:16px;margin-bottom:10px}
.review-item.wrong{border-left:3px solid var(--red)}
.review-item.right{border-left:3px solid var(--green)}
.review-item .q{font-weight:600;margin-bottom:8px;font-size:.9rem}
.review-item .ans{font-size:.85rem;color:var(--text2)}
.review-item .ans span{font-weight:600}
.review-item .ans.correct-ans{color:var(--green)}
.review-item .ans.wrong-ans{color:var(--red)}
.ref-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:.85rem}
.ref-table th{background:var(--surface3);color:var(--accent2);padding:10px 12px;text-align:left;font-weight:600}
.ref-table td{padding:10px 12px;border-bottom:1px solid var(--surface3)}
.ref-table tr:hover{background:var(--surface2)}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--surface);border-radius:var(--radius-sm);padding:4px}
.tab{flex:1;padding:10px;text-align:center;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;color:var(--text2);transition:all .2s ease}
.tab.active{background:var(--accent);color:#fff}
.timer{display:flex;align-items:center;gap:6px;color:var(--text2);font-size:.9rem;font-weight:600}
.timer.warning{color:var(--yellow)}
.nav-bottom{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--surface3);padding:10px 16px;display:flex;justify-content:center;gap:8px;z-index:100;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.nav-bottom .nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 20px;border:none;background:none;color:var(--text3);cursor:pointer;font-family:var(--font);font-size:.7rem;border-radius:8px;transition:all .2s ease}
.nav-bottom .nav-btn.active{color:var(--accent2)}
.nav-bottom .nav-btn .icon{font-size:1.3rem}
@media(min-width:768px){#app{padding:24px 32px 100px}.header h1{font-size:2.2rem}.stats-grid{grid-template-columns:repeat(4,1fr)}.q-text{font-size:1.25rem}.option{padding:16px 20px}}
@media(min-width:1024px){.card{padding:24px}.categories{gap:10px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const QUESTIONS = [
{id:1,cat:"signs",q:"What does a red octagonal sign mean?",o:["Yield","Stop","Do not enter","Wrong way"],a:1,he:"שלט עצור – עצירה מלאה חובה.",tip:"עצור לגמרי!"},
{id:2,cat:"signs",q:"A yellow diamond-shaped sign indicates:",o:["Regulation","Warning of hazard ahead","Guide to destination","Construction"],a:1,he:"שלט צהוב מעוין = אזהרה מסכנה לפניך."},
{id:3,cat:"signs",q:"What does a round yellow sign with an X and RR mean?",o:["Railroad crossing ahead","Road work","Roundabout","Rest area"],a:0,he:"שלט עגול צהוב X+RR = מעבר רכבת לפניך.",tip:"שלט X = רכבת!"},
{id:4,cat:"signs",q:"A white rectangular sign typically indicates:",o:["Warning","A regulation or law","Construction zone","Guide"],a:1,he:"שלט לבן מלבני = חוק או רגולציה."},
{id:5,cat:"signs",q:"A red circle with a line through it on a sign means:",o:["Required action","Action is prohibited","Caution","Speed advisory"],a:1,he:"עיגול אדום + קו = איסור."},
{id:6,cat:"signs",q:"What does a pennant-shaped sign indicate?",o:["School zone","No passing zone","Merge ahead","Yield"],a:1,he:"שלט דגלון = אזור ללא עקיפה."},
{id:7,cat:"signs",q:"A green highway sign provides:",o:["Regulatory info","Warning info","Guide and distance info","Construction info"],a:2,he:"שלט ירוק = מידע על כיוון ומרחק."},
{id:8,cat:"signs",q:"Double solid yellow lines in the center mean:",o:["Passing allowed both ways","No passing from either direction","Passing one direction only","One-way road"],a:1,he:"קו צהוב כפול רצוף = אסור לעקוף משני הכיוונים."},
{id:9,cat:"signs",q:"A broken white line between lanes means:",o:["No lane changing","May change lanes with caution","Road ending","Carpool boundary"],a:1,he:"קו לבן מקוטע = מותר להחליף נתיב בזהירות."},
{id:10,cat:"signs",q:"A solid white line between lanes means:",o:["Cross freely","Lane changing discouraged","Must exit","Carpool hours"],a:1,he:"קו לבן רצוף = החלפת נתיב לא מומלצת."},
{id:11,cat:"signs",q:"A flashing red traffic light means:",o:["Slow down and proceed","Stop, then proceed when safe","Yield","Signal broken"],a:1,he:"אדום מהבהב = כמו עצור. עצור והמשך כשבטוח."},
{id:12,cat:"signs",q:"A flashing yellow traffic light means:",o:["Stop completely","Proceed with caution","Yield to all","Speed up"],a:1,he:"צהוב מהבהב = המשך בזהירות."},
{id:13,cat:"signs",q:"Blue highway signs indicate:",o:["Distance info","Motorist services (food, gas, hospital)","Regulations","Hazard warning"],a:1,he:"שלט כחול = שירותים: דלק, אוכל, בית חולים."},
{id:14,cat:"signs",q:"Brown highway signs indicate:",o:["Motorist services","Recreational areas and parks","Regulations","Construction"],a:1,he:"שלט חום = אתרי פנאי ופארקים."},
{id:15,cat:"signs",q:"What does a yield sign look like?",o:["Red octagon","White rectangle","Red and white triangle pointing down","Yellow diamond"],a:2,he:"תן זכות קדימה = משולש אדום-לבן הפוך."},
{id:16,cat:"signs",q:"A 'Do Not Enter' sign is:",o:["Yellow diamond","White rectangle","Red circle with white horizontal bar","Green rectangle"],a:2,he:"שלט 'אל תיכנס' = עיגול אדום + פס לבן."},
{id:17,cat:"signs",q:"Orange signs indicate:",o:["School zones","Motorist services","Construction and work zones","Recreation"],a:2,he:"שלט כתום = אזור בנייה ועבודות."},
{id:18,cat:"signs",q:"Yellow pavement markings separate:",o:["Same direction traffic","Opposite direction traffic","Bike lanes","Parking areas"],a:1,he:"צהוב על הכביש = מפריד כיוונים מנוגדים."},
{id:19,cat:"signs",q:"White pavement markings separate:",o:["Opposite direction traffic","Same direction traffic","Bike lanes only","Emergency lanes"],a:1,he:"לבן על הכביש = מפריד נתיבים באותו כיוון."},
{id:20,cat:"signs",q:"What does a green arrow signal mean?",o:["Go after yielding","Protected turn in arrow direction","Accelerate quickly","Oncoming has priority"],a:1,he:"חץ ירוק = תור מוגן בכיוון החץ."},
{id:21,cat:"signs",q:"A raised hand pedestrian signal means:",o:["Cross now","Do not start crossing","Speed up","Safe to cross"],a:1,he:"יד מורמת = אל תתחיל לחצות."},
{id:22,cat:"signs",q:"A diamond marking on pavement indicates:",o:["Turn lane","HOV/carpool lane","Bicycle lane","Parking"],a:1,he:"מעוין על הכביש = נתיב HOV."},
{id:23,cat:"signs",q:"Red reflectors on the road mean:",o:["Right edge","Left edge","Going wrong way","Center line"],a:2,he:"רפלקטורים אדומים = נוסע בכיוון הלא נכון!"},
{id:24,cat:"signs",q:"What does a crossbuck (X-shaped) sign mark?",o:["School crossing","Railroad crossing","Bike crossing","Freeway interchange"],a:1,he:"שלט X = מעבר רכבת."},
{id:25,cat:"signs",q:"A sign with two arrows pointing opposite directions means:",o:["Two-way traffic ahead","Road splits","Divided highway ends","No passing"],a:0,he:"שני חצים מנוגדים = תנועה דו-כיוונית לפניך."},
{id:26,cat:"signs",q:"Chevron signs with arrows indicate:",o:["Merge ahead","Sharp curve in arrow direction","Road narrows","Divided highway"],a:1,he:"שלט שברון = עיקול חד בכיוון החצים."},
{id:27,cat:"signs",q:"A 'Wrong Way' sign has what colors?",o:["White text on red","Black on yellow","Red on white","White on green"],a:0,he:"שלט 'כיוון שגוי' = לבן על אדום."},
{id:28,cat:"signs",q:"A sign with a bicycle in a triangle warns of:",o:["Bikes only road","Bicycle crossing ahead","No bicycles","Bike parking"],a:1,he:"סמל אופניים במשולש = חציית רוכבים לפניך."},
{id:29,cat:"signs",q:"A red circle with line through a left-turn arrow means:",o:["Left turn required","Signal ahead","No left turn","Lane ends"],a:2,he:"עיגול אדום + קו על חץ שמאלה = פנייה שמאלה אסורה."},
{id:30,cat:"signs",q:"A shared center left-turn lane is marked by:",o:["Solid white lines both sides","Double yellow lines with inner dashes","Single dashed white line","Green markings"],a:1,he:"נתיב פנייה שמאלה משותף = צהוב כפול עם מקוטע בפנים."},
{id:31,cat:"signs",q:"What does a yellow advisory speed sign below a curve sign indicate?",o:["Mandatory speed","Maximum safe speed for the curve","Minimum speed","Speed limit change"],a:1,he:"מהירות מומלצת בצהוב = מהירות בטוחה מרבית לעיקול."},
{id:32,cat:"signs",q:"What color reflectors mark the right edge of the road?",o:["Red","White or yellow","Blue","Green"],a:1,he:"לבן/צהוב = קצה ימני של הכביש."},
{id:33,cat:"signs",q:"A pedestrian crossing sign is what shape and color?",o:["Yellow diamond with pedestrian figure","White rectangle","Red octagon","Green circle"],a:0,he:"שלט חציית הולכי רגל = מעוין צהוב עם דמות."},
{id:34,cat:"signs",q:"A speed limit sign is what shape and color?",o:["Yellow diamond","White rectangle with black text","Red octagon","Round yellow"],a:1,he:"שלט מהירות = מלבן לבן עם טקסט שחור."},
{id:35,cat:"signs",q:"What does a solid yellow line on your side of the center line mean?",o:["Passing allowed","No passing from your side","Road is closing","Construction zone"],a:1,he:"קו צהוב רצוף בצד שלך = אסור לעקוף מהצד שלך."},
{id:36,cat:"speed",q:"The speed limit in a residential area is:",o:["30 mph","15 mph","25 mph","35 mph"],a:2,he:"מהירות באזור מגורים: 25 מייל/ש (כ-40 קמ״ש).",tip:"25 mph = כ-40 קמ״ש"},
{id:37,cat:"speed",q:"The speed limit near a school when children are present is:",o:["15 mph","20 mph","25 mph","30 mph"],a:2,he:"מהירות ליד בית ספר: 25 מייל/ש (כ-40 קמ״ש).",tip:"25 mph = כ-40 קמ״ש"},
{id:38,cat:"speed",q:"The speed limit in an alley is:",o:["25 mph","15 mph","20 mph","10 mph"],a:1,he:"מהירות בסמטה: 15 מייל/ש (כ-24 קמ״ש).",tip:"15 mph = כ-24 קמ״ש"},
{id:39,cat:"speed",q:"The speed limit at a blind intersection is:",o:["25 mph","20 mph","15 mph","10 mph"],a:2,he:"מהירות בצומת עיוור: 15 מייל/ש (כ-24 קמ״ש).",tip:"15 mph = כ-24 קמ״ש"},
{id:40,cat:"speed",q:"Maximum speed on most California freeways is:",o:["55 mph","60 mph","65 mph","70 mph"],a:2,he:"מהירות מרבית בכביש מהיר: 65 מייל/ש (כ-105 קמ״ש).",tip:"65 mph = כ-105 קמ״ש"},
{id:41,cat:"speed",q:"Speed limit on a two-lane undivided highway is:",o:["45 mph","55 mph","65 mph","50 mph"],a:1,he:"כביש דו-נתיבי ללא מחיצה: 55 מייל/ש (כ-88 קמ״ש).",tip:"55 mph = כ-88 קמ״ש"},
{id:42,cat:"speed",q:"The recommended following distance is:",o:["1 second","2 seconds","3 seconds","5 seconds"],a:2,he:"מרחק עקיבה מומלץ: 3 שניות.",tip:"כלל 3 השניות."},
{id:43,cat:"speed",q:"Near a railroad crossing when you can't see 400 ft, max speed is:",o:["25 mph","20 mph","15 mph","10 mph"],a:2,he:"ליד מעבר רכבת בראות מוגבלת: 15 מייל/ש. 400 רגל = כ-122 מ׳.",tip:"15 mph = כ-24 קמ״ש"},
{id:44,cat:"speed",q:"When should you increase following distance?",o:["Clear dry weather","Being tailgated","Poor road/weather conditions","Driving downhill"],a:2,he:"הגדל מרחק עקיבה בתנאים גרועים: גשם, ערפל, כביש רטוב."},
{id:45,cat:"speed",q:"The speed limit in a business district is:",o:["25 mph","30 mph","35 mph","20 mph"],a:0,he:"מהירות באזור עסקים: 25 מייל/ש (כ-40 קמ״ש).",tip:"25 mph = כ-40 קמ״ש"},
{id:46,cat:"speed",q:"What is California's Basic Speed Law?",o:["Drive at posted limit","Never drive faster than safe for conditions","Drive as fast as traffic","Follow speed of vehicle ahead"],a:1,he:"חוק מהירות בסיסי: לא לנהוג מהר יותר ממה שבטוח לתנאים."},
{id:47,cat:"speed",q:"Large trucks on CA freeways are limited to:",o:["55 mph","65 mph","70 mph","Same as cars"],a:0,he:"משאיות מוגבלות ל-55 מייל/ש (כ-88 קמ״ש) בכביש מהיר.",tip:"55 mph = כ-88 קמ״ש"},
{id:48,cat:"speed",q:"If it's raining and you're driving 55 mph, you should:",o:["Maintain speed","Increase speed","Reduce speed","Pull over immediately"],a:2,he:"בגשם – הפחת מהירות. הכביש חלקלק ובלימה ארוכה יותר."},
{id:49,cat:"speed",q:"When following a motorcycle, you should allow:",o:["1-second following distance","2-second following distance","3 or 4-second following distance","Same as a car"],a:2,he:"עקוב אחרי אופנוע במרחק 3-4 שניות לפחות."},
{id:50,cat:"speed",q:"In heavy fog, you should use:",o:["High beams","Low beams","Parking lights only","No lights"],a:1,he:"בערפל כבד – אורות נמוכים בלבד. גבוהים מסנוורים.",tip:"אורות גבוהים בערפל = מסוכן!"},
{id:51,cat:"speed",q:"You should reduce speed when driving:",o:["On a wide straight highway","Through a narrow winding road","On a dry clear day","On a multi-lane freeway"],a:1,he:"הפחת מהירות בכביש צר ומפותל."},
{id:52,cat:"speed",q:"How far ahead should you look while driving on city streets?",o:["1 block","At least 10-15 seconds ahead","Just the car ahead","50 feet"],a:1,he:"הסתכל 10-15 שניות קדימה בנהיגה עירונית."},
{id:53,cat:"speed",q:"When towing a trailer on a freeway, your maximum speed is:",o:["65 mph","55 mph","45 mph","70 mph"],a:1,he:"גרירת נגרר בכביש מהיר: מקסימום 55 מייל/ש (כ-88 קמ״ש).",tip:"55 mph = כ-88 קמ״ש"},
{id:54,cat:"speed",q:"Driving too slowly on the freeway can be:",o:["Always safe","Just as dangerous as speeding","Legal at all times","Only dangerous at night"],a:1,he:"נהיגה איטית מדי בכביש מהיר מסוכנת כמו מהירות מופרזת."},
{id:55,cat:"speed",q:"On wet roads, you should reduce speed by about:",o:["5 mph","5-10 mph","One-third","Nothing"],a:2,he:"בכביש רטוב הפחת מהירות בכשליש."},
{id:56,cat:"right_of_way",q:"At an uncontrolled intersection, you must yield to:",o:["The car on your left","The car on your right","The faster car","The larger vehicle"],a:1,he:"בצומת ללא תמרור – תן זכות קדימה לרכב מימין.",tip:"ימין = קדימה."},
{id:57,cat:"right_of_way",q:"When two vehicles arrive at a 4-way stop at the same time:",o:["The larger vehicle goes first","The vehicle on the right goes first","The vehicle going straight goes first","The fastest vehicle goes first"],a:1,he:"ב-4 way stop – הרכב מימין נוסע ראשון."},
{id:58,cat:"right_of_way",q:"You must yield to pedestrians:",o:["Only at marked crosswalks","At marked and unmarked crosswalks","Only when they have a green signal","Only at traffic lights"],a:1,he:"תן זכות קדימה להולכי רגל במעברים מסומנים וגם לא מסומנים.",tip:"הולך רגל = תמיד קדימה."},
{id:59,cat:"right_of_way",q:"When an emergency vehicle approaches with lights and sirens:",o:["Speed up to clear the intersection","Stop where you are","Pull to the right and stop","Continue at current speed"],a:2,he:"רכב חירום עם אורות וסירנה – פנה ימינה ועצור.",tip:"פנה ימינה ועצור."},
{id:60,cat:"right_of_way",q:"At a T-intersection with no signs, who has the right-of-way?",o:["Traffic on the through road","Traffic on the terminating road","Whoever arrives first","The larger vehicle"],a:0,he:"בצומת T ללא תמרורים – תנועה בכביש הראשי קודמת."},
{id:61,cat:"right_of_way",q:"When entering a roundabout, you must:",o:["Speed up to merge","Stop completely","Yield to traffic already in the roundabout","Go clockwise"],a:2,he:"בכניסה לכיכר – תן זכות קדימה לתנועה שכבר בפנים.",tip:"כיכר = נגד כיוון השעון בארה״ב."},
{id:62,cat:"right_of_way",q:"A blind or visually impaired pedestrian with a white cane:",o:["Has no special right-of-way","Must always be given the right-of-way","Should be honked at to warn them","May be passed closely"],a:1,he:"עיוור עם מקל לבן – חובה לתת זכות קדימה תמיד."},
{id:63,cat:"right_of_way",q:"When making a left turn, you must yield to:",o:["No one if you have a green light","Oncoming traffic and pedestrians","Only pedestrians","Only other cars turning left"],a:1,he:"בפנייה שמאלה – תן זכות קדימה לתנועה הנגדית ולהולכי רגל."},
{id:64,cat:"right_of_way",q:"When entering a road from a driveway, you must yield to:",o:["No one","Traffic on the road and pedestrians on the sidewalk","Only traffic from the left","Only pedestrians"],a:1,he:"ביציאה מחניה/שביל – תן זכות קדימה לתנועה ולהולכי רגל."},
{id:65,cat:"right_of_way",q:"You should NOT enter an intersection if:",o:["The light is green","You cannot make it completely through","There are no pedestrians","Traffic is moving"],a:1,he:"אל תיכנס לצומת אם אתה לא יכול לעבור אותו לגמרי – לא לחסום!"},
{id:66,cat:"right_of_way",q:"A funeral procession:",o:["Must yield to you","Has the right-of-way","Must stop at all red lights","May be passed freely"],a:1,he:"תהלוכת לוויה – יש לה זכות קדימה. אל תיכנס לתוכה."},
{id:67,cat:"right_of_way",q:"When turning right on a red light after stopping, you must yield to:",o:["No one","Pedestrians and cross traffic","Only pedestrians","Only vehicles"],a:1,he:"פנייה ימינה באדום – תן קדימה להולכי רגל ולתנועה החוצה."},
{id:68,cat:"right_of_way",q:"If you reach an intersection where the traffic lights are not working:",o:["Treat it as a yield sign","Treat it as a 4-way stop","The busier road has right-of-way","Proceed through without stopping"],a:1,he:"רמזור מושבת = כמו צומת עצור 4-כיווני."},
{id:69,cat:"right_of_way",q:"When a school bus has flashing red lights, you must:",o:["Slow to 15 mph","Stop in both directions","Pass carefully","Honk and proceed"],a:1,he:"אוטובוס בית ספר + אורות אדומים = עצור משני הכיוונים!",tip:"חריג: כביש מחולק עם מחיצה."},
{id:70,cat:"right_of_way",q:"You must stop for a school bus with red lights flashing unless:",o:["You're in a hurry","You're on a divided highway separated by a barrier","The bus driver waves you on","It's after school hours"],a:1,he:"לא חייב לעצור רק אם יש מחיצה פיזית (כביש מחולק)."},
{id:71,cat:"lanes",q:"Before changing lanes you must:",o:["Honk your horn","Check mirrors and look over your shoulder","Flash your headlights","Speed up"],a:1,he:"לפני החלפת נתיב: בדוק מראות + הסתכל מעבר לכתף (נקודה מתה)."},
{id:72,cat:"lanes",q:"You must signal at least ______ before making a turn.",o:["50 feet","100 feet","200 feet","300 feet"],a:1,he:"סמן לפחות 100 רגל (כ-30 מ׳) לפני פנייה.",tip:"100 רגל = כ-30 מטר"},
{id:73,cat:"lanes",q:"When turning left from a two-way road, turn from:",o:["The right lane","Any lane","The lane closest to the center line","The center lane"],a:2,he:"פנייה שמאלה – מהנתיב הקרוב ביותר לקו האמצע."},
{id:74,cat:"lanes",q:"When turning right, you should turn from:",o:["The left lane","Center lane","The lane closest to the right curb","Any lane"],a:2,he:"פנייה ימינה – מהנתיב הימני ביותר."},
{id:75,cat:"lanes",q:"A center left-turn lane may be entered within:",o:["100 feet of your turn","200 feet of your turn","300 feet of your turn","Any distance"],a:1,he:"היכנס לנתיב פנייה שמאלה מרכזי תוך 200 רגל (כ-61 מ׳) מהפנייה.",tip:"200 רגל = כ-61 מטר"},
{id:76,cat:"lanes",q:"U-turns are illegal:",o:["At any intersection","In front of a fire station","At a traffic light","On any two-lane road"],a:1,he:"פרסה אסור מול תחנת כיבוי."},
{id:77,cat:"lanes",q:"When making a right turn into a street with two lanes, turn into:",o:["The left lane","Either lane","The lane closest to the curb","The center"],a:2,he:"פנייה ימינה – היכנס לנתיב הימני (הקרוב לשפת המדרכה)."},
{id:78,cat:"lanes",q:"You should not make a U-turn:",o:["At a green light","On a one-way street","At any intersection","On a two-lane road"],a:1,he:"אסור לעשות פרסה ברחוב חד-סטרי."},
{id:79,cat:"lanes",q:"An HOV lane with a solid line may be entered:",o:["Anytime","Only at designated entry points","When traffic is heavy","Never"],a:1,he:"נתיב HOV עם קו רצוף – כניסה רק בנקודות מסומנות."},
{id:80,cat:"lanes",q:"When making a left turn from a one-way street to a one-way street:",o:["Turn from the right lane","Turn from the left-most lane","Turn from any lane","U-turn is required"],a:1,he:"פנייה שמאלה מרחוב חד-סטרי – מהנתיב השמאלי ביותר."},
{id:81,cat:"lanes",q:"The 'blind spot' is the area:",o:["Directly in front","In your rearview mirror","Not visible in your mirrors","On the dashboard"],a:2,he:"נקודה מתה = אזור שלא נראה במראות. הסתכל מעבר לכתף!"},
{id:82,cat:"lanes",q:"When driving on a multi-lane highway, the best lane for through traffic is:",o:["The right lane","The center lane","The left lane","The HOV lane"],a:1,he:"בכביש רב-נתיבי, הנתיב המרכזי מיועד לנסיעה ישרה."},
{id:83,cat:"lanes",q:"On a two-lane road, you may pass on the right:",o:["Never","When the other vehicle is turning left","On any two-lane road","When the road is uphill"],a:1,he:"מותר לעקוף מימין כשהרכב שלפניך פונה שמאלה."},
{id:84,cat:"lanes",q:"You may use a bike lane for turning:",o:["Never","Within 200 feet of the turn","At any time","Only on weekends"],a:1,he:"מותר להיכנס לנתיב אופניים 200 רגל (כ-61 מ׳) לפני פנייה.",tip:"200 רגל = כ-61 מטר"},
{id:85,cat:"lanes",q:"When exiting a freeway, you should slow down:",o:["On the freeway","On the exit ramp","Before the exit sign","On the shoulder"],a:1,he:"האט על רמפת היציאה, לא על הכביש המהיר עצמו."},
{id:86,cat:"parking",q:"A red curb means:",o:["Loading zone","No stopping, standing, or parking","Disabled parking","5-minute parking"],a:1,he:"אבן שפה אדומה = אסור לעצור, לעמוד, או לחנות.",tip:"אדום = אסור בכלל!"},
{id:87,cat:"parking",q:"A white curb means:",o:["Loading only","5-minute stop for passengers","Disabled parking","No stopping"],a:1,he:"אבן שפה לבנה = עצירה של 5 דקות להורדת/העלאת נוסעים."},
{id:88,cat:"parking",q:"A green curb means:",o:["No parking","Limited-time parking","Disabled parking","Loading zone"],a:1,he:"אבן שפה ירוקה = חניה מוגבלת בזמן (בדוק את השלט)."},
{id:89,cat:"parking",q:"A yellow curb means:",o:["No stopping","Loading zone only","5-minute stop","Disabled parking"],a:1,he:"אבן שפה צהובה = אזור העמסה/פריקה בלבד.",tip:"צהוב = העמסה בלבד."},
{id:90,cat:"parking",q:"A blue curb means:",o:["Loading zone","Short-term parking","Parking for persons with disabilities","Bus zone"],a:2,he:"אבן שפה כחולה = חניית נכים בלבד. צריך תג נכה.",tip:"כחול = נכים בלבד."},
{id:91,cat:"parking",q:"When parked uphill with a curb, turn your wheels:",o:["Toward the curb","Away from the curb","Straight ahead","To the right"],a:1,he:"חניה במעלה הר עם אבן שפה – גלגלים הרחק מהשפה.",tip:"עולה+שפה = גלגלים החוצה."},
{id:92,cat:"parking",q:"When parked downhill, turn your wheels:",o:["Away from the curb","Toward the curb","Straight ahead","To the left"],a:1,he:"חניה בירידה – גלגלים לכיוון השפה.",tip:"יורד = גלגלים פנימה."},
{id:93,cat:"parking",q:"When parked on a hill with no curb, turn wheels:",o:["Toward the center","Toward the edge of the road","Straight","Away from the edge"],a:1,he:"חניה בהר ללא שפה – גלגלים לכיוון קצה הכביש (ימינה).",tip:"ללא שפה = תמיד ימינה."},
{id:94,cat:"parking",q:"You may not park within ____ feet of a fire hydrant.",o:["10","15","20","25"],a:1,he:"אסור לחנות תוך 15 רגל (כ-4.5 מ׳) מברז כיבוי.",tip:"15 רגל = כ-4.5 מטר"},
{id:95,cat:"parking",q:"It is illegal to park within ____ feet of a railroad track.",o:["5.5","7.5","10","15"],a:1,he:"אסור לחנות תוך 7.5 רגל (כ-2.3 מ׳) מפסי רכבת.",tip:"7.5 רגל = כ-2.3 מטר"},
{id:96,cat:"parking",q:"When leaving your parked car, you should:",o:["Leave the engine running","Set the parking brake","Leave windows open","Leave it in neutral"],a:1,he:"כשעוזבים את הרכב – הפעל בלם חניה."},
{id:97,cat:"parking",q:"You must not park within ____ feet of a crosswalk.",o:["10","15","20","25"],a:1,he:"אסור לחנות תוך 15 רגל (כ-4.5 מ׳) ממעבר חצייה.",tip:"15 רגל = כ-4.5 מטר"},
{id:98,cat:"alcohol",q:"The legal BAC limit for drivers 21 and older is:",o:["0.05%","0.10%","0.08%","0.04%"],a:2,he:"מגבלת אלכוהול בדם לנהגים מעל 21: 0.08%.",tip:"0.08% = הגבול."},
{id:99,cat:"alcohol",q:"The BAC limit for drivers under 21 is:",o:["0.08%","0.04%","0.02%","0.01%"],a:3,he:"מגבלת אלכוהול לנהגים מתחת ל-21: 0.01% (סובלנות אפס).",tip:"מתחת ל-21: כמעט אפס!"},
{id:100,cat:"alcohol",q:"The BAC limit for commercial drivers is:",o:["0.08%","0.06%","0.04%","0.02%"],a:2,he:"מגבלת אלכוהול לנהגי רכב מסחרי: 0.04%."},
{id:101,cat:"alcohol",q:"California's 'implied consent' law means:",o:["You consent to a vehicle search","You agree to a BAC test if lawfully arrested for DUI","You consent to random stops","You agree to carry ID"],a:1,he:"חוק 'הסכמה משתמעת' = אם נעצרת על שכרות – חובה לבצע בדיקת אלכוהול."},
{id:102,cat:"alcohol",q:"Refusing a BAC test when arrested for DUI results in:",o:["A warning","Automatic license suspension","A fine only","Community service"],a:1,he:"סירוב לבדיקת אלכוהול = שלילת רישיון אוטומטית."},
{id:103,cat:"alcohol",q:"Which of the following can impair driving ability?",o:["Prescription medications","Only alcohol","Only illegal drugs","Only fatigue"],a:0,he:"גם תרופות מרשם יכולות לפגוע ביכולת הנהיגה!"},
{id:104,cat:"alcohol",q:"An under-21 driver with a BAC of 0.01% or higher will face:",o:["No consequences","A 1-year license suspension","A warning only","A fine only"],a:1,he:"נהג מתחת ל-21 עם 0.01% אלכוהול = שלילה לשנה."},
{id:105,cat:"alcohol",q:"Having an open container of alcohol in the vehicle is:",o:["Legal if sealed","Illegal for all occupants","Legal for passengers","Legal if not drinking"],a:1,he:"מיכל אלכוהול פתוח ברכב = אסור לכל הנוסעים."},
{id:106,cat:"alcohol",q:"First DUI conviction can result in:",o:["Warning only","Fine and/or jail time and license suspension","A small fine","No consequences for first offense"],a:1,he:"הרשעה ראשונה ב-DUI: קנס, אפשרות מאסר ושלילת רישיון."},
{id:107,cat:"alcohol",q:"Coffee, cold showers, or exercise will:",o:["Sober you up quickly","Not reduce your BAC","Reduce BAC by half","Eliminate impairment"],a:1,he:"קפה, מקלחת קרה ופעילות גופנית לא מורידים אלכוהול מהדם!",tip:"רק זמן מפחית אלכוהול."},
{id:108,cat:"alcohol",q:"Drinking alcohol affects your driving by:",o:["Improving reaction time","Reducing judgment and reaction time","Only affecting vision","Having no effect at low levels"],a:1,he:"אלכוהול פוגע בשיפוט, בזמן תגובה ובקואורדינציה."},
{id:109,cat:"alcohol",q:"A minor convicted of DUI for the first time faces license suspension of:",o:["6 months","1 year","2 years","3 months"],a:1,he:"קטין (מתחת ל-21) מורשע ב-DUI = שלילה לשנה."},
{id:110,cat:"freeway",q:"When merging onto a freeway, you should:",o:["Stop on the ramp and wait","Match freeway speed on the on-ramp","Enter at 25 mph","Always yield to the right"],a:1,he:"בכניסה לכביש מהיר – התאם מהירות לתנועה עוד ברמפה."},
{id:111,cat:"freeway",q:"If you miss your freeway exit, you should:",o:["Stop and back up","Make a U-turn","Continue to the next exit","Cross the median"],a:2,he:"פספסת יציאה? המשך ליציאה הבאה. לא לעצור או לסגת!"},
{id:112,cat:"freeway",q:"The far left lane on a freeway is for:",o:["Slower traffic","Passing or faster traffic","Trucks only","Emergency vehicles"],a:1,he:"הנתיב שמאלי = לעקיפה ותנועה מהירה."},
{id:113,cat:"freeway",q:"When exiting a freeway, signal approximately:",o:["50 feet before","100 feet before","At the exit","On the off-ramp"],a:1,he:"סמן יציאה כ-100 רגל (כ-30 מ׳) לפני.",tip:"100 רגל = כ-30 מטר"},
{id:114,cat:"freeway",q:"If your car breaks down on the freeway, you should:",o:["Stop in the left lane","Pull to the right shoulder","Stop where you are","Make a U-turn"],a:1,he:"תקלה בכביש מהיר – פנה לשולימין. הדלק אורות חירום."},
{id:115,cat:"freeway",q:"Driving too slowly on the freeway:",o:["Is always safe","Can impede traffic and cause accidents","Is required in rain","Is encouraged"],a:1,he:"נהיגה איטית מדי בכביש מהיר יכולה לגרום לתאונות."},
{id:116,cat:"freeway",q:"The minimum speed on a California freeway is typically:",o:["25 mph","35 mph","There is no set minimum but you must not impede traffic","55 mph"],a:2,he:"אין מהירות מינימום קבועה, אבל אסור לעכב את התנועה."},
{id:117,cat:"freeway",q:"When entering a freeway, who has the right-of-way?",o:["The merging vehicle","Traffic already on the freeway","Neither","The faster vehicle"],a:1,he:"תנועה בכביש המהיר קודמת – המצטרף חייב להתאים ולהשתלב."},
{id:118,cat:"freeway",q:"On a freeway, what should you do if you are being tailgated?",o:["Slam on brakes","Speed up","Move to the right lane when safe","Stop suddenly"],a:2,he:"אם צמודים לך מאחור – עבור לנתיב ימני כשבטוח."},
{id:119,cat:"freeway",q:"A carpool (HOV) lane requires at least:",o:["1 person","2 or more persons","4 persons","A special permit"],a:1,he:"נתיב HOV דורש לפחות 2 נוסעים (כולל הנהג).",tip:"HOV = 2+ אנשים."},
{id:120,cat:"freeway",q:"Freeway on-ramps are used for:",o:["Stopping to check traffic","Accelerating to match freeway speed","Driving slowly","Parking"],a:1,he:"רמפת כניסה = האצה למהירות הכביש המהיר."},
{id:121,cat:"freeway",q:"If there is a vehicle on the shoulder of the freeway, you should:",o:["Maintain speed in current lane","Move over a lane or slow down","Stop to help","Flash your lights"],a:1,he:"רכב בשוליים – עבור נתיב או האט. זה חוק 'Move Over'."},
{id:122,cat:"safety",q:"All front-seat occupants must wear:",o:["Nothing required","A seatbelt","Only on freeways","A helmet"],a:1,he:"חובת חגורת בטיחות לכל יושבי המושבים הקדמיים."},
{id:123,cat:"safety",q:"Children under what age must be in a car seat or booster?",o:["4","6","8","10"],a:2,he:"ילדים מתחת לגיל 8 חייבים מושב בטיחות או בוסטר.",tip:"מתחת ל-8 = מושב ילדים."},
{id:124,cat:"safety",q:"If your vehicle starts to skid, you should:",o:["Slam on the brakes","Steer in the direction you want to go","Steer opposite to the skid","Accelerate"],a:1,he:"בהחלקה – כוון את ההגה לכיוון שאתה רוצה לנסוע."},
{id:125,cat:"safety",q:"If your car's tire blows out, you should:",o:["Slam the brakes","Grip the steering wheel firmly and slow gradually","Swerve to the shoulder immediately","Accelerate"],a:1,he:"פנצ׳ר – אחוז בהגה חזק, האט בהדרגה. אל תבלום פתאום!"},
{id:126,cat:"safety",q:"Headlights are required from:",o:["Sunset to sunrise","30 min after sunset to 30 min before sunrise","Dusk to dawn","Only at night"],a:1,he:"אורות חובה מ-30 דקות אחרי שקיעה עד 30 דקות לפני זריחה.",tip:"וגם כשראות מתחת ל-1000 רגל."},
{id:127,cat:"safety",q:"Use headlights when you cannot see more than:",o:["500 feet","1000 feet","1500 feet","2000 feet"],a:1,he:"הדלק אורות כשראות מתחת ל-1000 רגל (כ-305 מ׳).",tip:"1000 רגל = כ-305 מטר"},
{id:128,cat:"safety",q:"When driving behind a large truck, you should:",o:["Follow closely","Increase following distance","Drive in their blind spot","Flash your lights"],a:1,he:"נהג אחרי משאית – הגדל מרחק. למשאיות יש נקודות מתות גדולות."},
{id:129,cat:"safety",q:"If you are in an accident, you must:",o:["Leave the scene quickly","Stop, exchange info, and report if needed","Call your insurance first","Move your car immediately"],a:1,he:"בתאונה – עצור, החלף פרטים, ודווח במידת הצורך."},

// === CA DMV Test Prep App Logic ===

const CATEGORIES = {
  signs: { name: 'Road Signs', icon: '🚧', he: 'תמרורים וסימוני כביש' },
  speed: { name: 'Speed Limits', icon: '⚡', he: 'מגבלות מהירות' },
  right_of_way: { name: 'Right-of-Way', icon: '🚦', he: 'זכות קדימה' },
  lanes: { name: 'Lanes & Turning', icon: '↩️', he: 'נתיבים ופניות' },
  parking: { name: 'Parking', icon: '🅿️', he: 'חניה' },
  alcohol: { name: 'Alcohol & Drugs', icon: '🚫', he: 'אלכוהול וסמים' },
  freeway: { name: 'Freeway Driving', icon: '🛣️', he: 'נהיגה בכביש מהיר' },
  safety: { name: 'Safety', icon: '🛡️', he: 'בטיחות וחירום' },
  equipment: { name: 'Equipment', icon: '🔧', he: 'ציוד הרכב' },
  special: { name: 'Special Situations', icon: '⚠️', he: 'מצבים מיוחדים' }
};

// State
let state = {
  screen: 'home',
  studyCat: null,
  studyIdx: 0,
  studyAnswered: false,
  testQuestions: [],
  testIdx: 0,
  testAnswers: [],
  testStartTime: null,
  testTimerId: null,
  refTab: 'speed',
  progress: loadProgress()
};

function loadProgress() {
  try {
    return JSON.parse(localStorage.getItem('dmv_progress')) || { studied: {}, tests: [] };
  } catch { return { studied: {}, tests: [] }; }
}

function saveProgress() {
  localStorage.setItem('dmv_progress', JSON.stringify(state.progress));
}

function markStudied(qId) {
  state.progress.studied[qId] = true;
  saveProgress();
}

function getStudiedCount(cat) {
  if (!cat) return Object.keys(state.progress.studied).length;
  return QUESTIONS.filter(q => q.cat === cat && state.progress.studied[q.id]).length;
}

function getCatQuestions(cat) {
  return QUESTIONS.filter(q => q.cat === cat);
}

// Render
function render() {
  const app = document.getElementById('app');
  switch(state.screen) {
    case 'home': app.innerHTML = renderHome(); break;
    case 'study': app.innerHTML = renderStudy(); break;
    case 'study_q': app.innerHTML = renderStudyQ(); break;
    case 'test_start': app.innerHTML = renderTestStart(); break;
    case 'test': app.innerHTML = renderTest(); break;
    case 'results': app.innerHTML = renderResults(); break;
    case 'review': app.innerHTML = renderReview(); break;
    case 'reference': app.innerHTML = renderReference(); break;
  }
  app.innerHTML += renderNav();
}

function renderHome() {
  const totalQ = QUESTIONS.length;
  const studied = getStudiedCount();
  const testsDone = state.progress.tests.length;
  const bestScore = testsDone > 0 ? Math.max(...state.progress.tests.map(t => t.score)) : 0;
  const pct = Math.round((studied / totalQ) * 100);

  return `
    <div class="screen active">
      <div class="header">
        <div class="logo">🚗</div>
        <h1>CA DMV Test Prep</h1>
        <p>הכנה למבחן התאוריה בקליפורניה</p>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="num">${studied}</div><div class="label">שאלות נלמדו</div></div>
        <div class="stat-card"><div class="num">${totalQ}</div><div class="label">סה״כ שאלות</div></div>
        <div class="stat-card"><div class="num">${testsDone}</div><div class="label">מבחנים</div></div>
        <div class="stat-card"><div class="num">${bestScore}%</div><div class="label">ציון הכי טוב</div></div>
      </div>
      <div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div>
      <p style="text-align:center;color:var(--text3);font-size:.8rem;margin-bottom:16px">${pct}% הושלם</p>
      
      <div class="card" onclick="navigate('study')">
        <div class="card-icon">📚</div>
        <h3>Study Mode / מצב לימוד</h3>
        <p>לימוד שאלות לפי קטגוריה עם הסברים בעברית</p>
        <div class="badge">${studied}/${totalQ}</div>
      </div>
      
      <div class="card" onclick="navigate('test_start')">
        <div class="card-icon">📝</div>
        <h3>Practice Test / מבחן תרגול</h3>
        <p>סימולציה של המבחן האמיתי — 46 שאלות, 83% מעבר</p>
        ${testsDone > 0 ? `<div class="badge">Best: ${bestScore}%</div>` : ''}
      </div>
      
      <div class="card" onclick="navigate('reference')">
        <div class="card-icon">📋</div>
        <h3>Quick Reference / טבלאות עזר</h3>
        <p>מהירויות, מרחקים, תמרורים — עם המרה לק״מ</p>
      </div>
    </div>`;
}

function renderStudy() {
  const cats = Object.entries(CATEGORIES);
  return `
    <div class="screen active">
      <button class="btn-back" onclick="navigate('home')">← חזרה לדף הבית</button>
      <h2 style="font-size:1.4rem;font-weight:800;margin:12px 0">📚 בחר קטגוריה</h2>
      <p style="color:var(--text2);font-size:.85rem;margin-bottom:16px">בחר נושא ללימוד. השאלות באנגלית, ההסברים בעברית.</p>
      ${cats.map(([key, cat]) => {
        const total = getCatQuestions(key).length;
        const done = getStudiedCount(key);
        const pct = Math.round((done / total) * 100);
        return `
        <div class="card" onclick="startStudy('${key}')">
          <div class="card-icon">${cat.icon}</div>
          <h3>${cat.name}</h3>
          <p>${cat.he}</p>
          <div class="badge">${done}/${total}</div>
          <div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div>
        </div>`;
      }).join('')}
    </div>`;
}

function renderStudyQ() {
  const questions = getCatQuestions(state.studyCat);
  const q = questions[state.studyIdx];
  const cat = CATEGORIES[state.studyCat];
  const letters = ['A', 'B', 'C', 'D'];
  const isStudied = state.progress.studied[q.id];
  
  return `
    <div class="screen active">
      <button class="btn-back" onclick="navigate('study')">← חזרה לקטגוריות</button>
      <div class="q-header">
        <span class="q-num">${state.studyIdx + 1} / ${questions.length}</span>
        <span class="q-cat">${cat.icon} ${cat.name}</span>
      </div>
      <div class="progress-bar"><div class="fill" style="width:${((state.studyIdx + 1) / questions.length) * 100}%"></div></div>
      <div class="q-text">${q.q}</div>
      <div class="options" id="study-options">
        ${q.o.map((opt, i) => `
          <button class="option ${state.studyAnswered ? (i === q.a ? 'correct' : (document.querySelector('.option.wrong') ? '' : '')) : ''}" 
            onclick="answerStudy(${i})" ${state.studyAnswered ? 'disabled' : ''}>
            <span class="option-letter">${letters[i]}</span>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div id="study-explanation"></div>
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn btn-secondary" onclick="prevStudy()" ${state.studyIdx === 0 ? 'disabled style="opacity:.4"' : ''}>← הקודם</button>
        <button class="btn btn-primary" style="flex:1" onclick="nextStudy()">${state.studyIdx < questions.length - 1 ? 'הבא →' : 'סיום ✓'}</button>
      </div>
    </div>`;
}

function renderTestStart() {
  return `
    <div class="screen active">
      <button class="btn-back" onclick="navigate('home')">← חזרה לדף הבית</button>
      <div style="text-align:center;padding:32px 0">
        <div style="font-size:4rem;margin-bottom:16px">📝</div>
        <h2 style="font-size:1.5rem;font-weight:800;margin-bottom:8px">Practice Test</h2>
        <h3 style="font-size:1.1rem;font-weight:600;color:var(--text2);margin-bottom:24px">מבחן תרגול</h3>
        
        <div style="background:var(--surface);border-radius:var(--radius);padding:20px;text-align:right;direction:rtl;margin-bottom:24px">
          <p style="margin-bottom:8px">📌 <strong>46 שאלות</strong> אקראיות מכל הקטגוריות</p>
          <p style="margin-bottom:8px">⏱️ <strong>ללא הגבלת זמן</strong> (אבל עם טיימר למעקב)</p>
          <p style="margin-bottom:8px">✅ <strong>83% נדרש למעבר</strong> (38 מתוך 46)</p>
          <p>📊 תקבל סקירה מפורטת של כל תשובה שגויה</p>
        </div>
        
        <button class="btn btn-primary btn-block" onclick="startTest()" style="font-size:1.1rem;padding:18px">
          🚀 התחל מבחן
        </button>
      </div>
    </div>`;
}

function renderTest() {
  const q = state.testQuestions[state.testIdx];
  const letters = ['A', 'B', 'C', 'D'];
  const answered = state.testAnswers[state.testIdx] !== undefined;
  const elapsed = Math.floor((Date.now() - state.testStartTime) / 1000);
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;

  return `
    <div class="screen active">
      <div class="q-header">
        <span class="q-num">שאלה ${state.testIdx + 1} / 46</span>
        <span class="timer" id="test-timer">⏱ ${mins}:${secs.toString().padStart(2, '0')}</span>
      </div>
      <div class="progress-bar"><div class="fill" style="width:${((state.testIdx + 1) / 46) * 100}%"></div></div>
      <div class="q-cat" style="margin-bottom:12px">${CATEGORIES[q.cat].icon} ${CATEGORIES[q.cat].name}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.o.map((opt, i) => `
          <button class="option ${answered ? (i === q.a ? 'correct' : (state.testAnswers[state.testIdx] === i && i !== q.a ? 'wrong' : 'disabled')) : ''}" 
            onclick="answerTest(${i})" ${answered ? 'disabled' : ''}>
            <span class="option-letter">${letters[i]}</span>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
      ${answered ? `
        <div class="explanation">
          <h4>💡 הסבר</h4>
          <p>${q.he}</p>
          ${q.tip ? `<div class="tip">💡 ${q.tip}</div>` : ''}
        </div>
        <button class="btn btn-primary btn-block" style="margin-top:16px" onclick="nextTest()">
          ${state.testIdx < 45 ? 'שאלה הבאה →' : '📊 הצג תוצאות'}
        </button>
      ` : ''}
    </div>`;
}

function renderResults() {
  const correct = state.testAnswers.filter((ans, i) => ans === state.testQuestions[i].a).length;
  const pct = Math.round((correct / 46) * 100);
  const passed = pct >= 83;
  const elapsed = Math.floor((Date.now() - state.testStartTime) / 1000);
  const mins = Math.floor(elapsed / 60);
  
  if (state.testTimerId) { clearInterval(state.testTimerId); state.testTimerId = null; }

  return `
    <div class="screen active">
      <div style="text-align:center;padding:24px 0">
        <div style="font-size:4rem;margin-bottom:8px">${passed ? '🎉' : '📖'}</div>
        <div class="result-circle ${passed ? 'pass' : 'fail'}">
          <span class="score">${pct}%</span>
          <span class="label">${correct}/46</span>
        </div>
        <div class="result-msg ${passed ? 'pass' : 'fail'}">
          ${passed ? '!עברת בהצלחה 🎊' : 'צריך עוד תרגול 💪'}
        </div>
        <p style="color:var(--text2);font-size:.9rem">זמן: ${mins} דקות | נדרש: 83% (38/46)</p>
      </div>
      
      <div style="display:flex;gap:8px;margin:20px 0">
        <button class="btn btn-secondary" style="flex:1" onclick="navigate('review')">📋 סקירת שאלות</button>
        <button class="btn btn-primary" style="flex:1" onclick="navigate('test_start')">🔄 מבחן חדש</button>
      </div>
      <button class="btn btn-secondary btn-block" onclick="navigate('home')">🏠 דף הבית</button>
    </div>`;
}

function renderReview() {
  const wrong = [];
  const right = [];
  state.testAnswers.forEach((ans, i) => {
    const q = state.testQuestions[i];
    const isCorrect = ans === q.a;
    const item = { q: q.q, userAns: q.o[ans], correctAns: q.o[q.a], isCorrect, he: q.he };
    if (isCorrect) right.push(item); else wrong.push(item);
  });

  return `
    <div class="screen active">
      <button class="btn-back" onclick="navigate('results')">← חזרה לתוצאות</button>
      <h2 style="font-size:1.3rem;font-weight:800;margin:12px 0;direction:rtl">📋 סקירת תשובות</h2>
      ${wrong.length > 0 ? `
        <h3 style="color:var(--red);font-size:1rem;margin:16px 0 8px;direction:rtl">❌ תשובות שגויות (${wrong.length})</h3>
        ${wrong.map(item => `
          <div class="review-item wrong">
            <div class="q">${item.q}</div>
            <div class="ans wrong-ans">Your answer: <span>${item.userAns}</span></div>
            <div class="ans correct-ans">Correct: <span>${item.correctAns}</span></div>
            <div class="explanation" style="margin-top:10px"><p>${item.he}</p></div>
          </div>
        `).join('')}
      ` : ''}
      <h3 style="color:var(--green);font-size:1rem;margin:16px 0 8px;direction:rtl">✅ תשובות נכונות (${right.length})</h3>
      ${right.map(item => `
        <div class="review-item right">
          <div class="q">${item.q}</div>
          <div class="ans correct-ans">✓ <span>${item.correctAns}</span></div>
        </div>
      `).join('')}
    </div>`;
}

function renderReference() {
  return `
    <div class="screen active">
      <button class="btn-back" onclick="navigate('home')">← חזרה לדף הבית</button>
      <h2 style="font-size:1.3rem;font-weight:800;margin:12px 0">📋 Quick Reference / טבלאות עזר</h2>
      
      <div class="tabs">
        <div class="tab ${state.refTab === 'speed' ? 'active' : ''}" onclick="setRefTab('speed')">מהירויות</div>
        <div class="tab ${state.refTab === 'distance' ? 'active' : ''}" onclick="setRefTab('distance')">מרחקים</div>
        <div class="tab ${state.refTab === 'curbs' ? 'active' : ''}" onclick="setRefTab('curbs')">צבעי מדרכה</div>
        <div class="tab ${state.refTab === 'bac' ? 'active' : ''}" onclick="setRefTab('bac')">אלכוהול</div>
      </div>
      
      ${state.refTab === 'speed' ? renderSpeedRef() : ''}
      ${state.refTab === 'distance' ? renderDistanceRef() : ''}
      ${state.refTab === 'curbs' ? renderCurbRef() : ''}
      ${state.refTab === 'bac' ? renderBACRef() : ''}
    </div>`;
}

function renderSpeedRef() {
  return `
    <table class="ref-table">
      <tr><th>Location / מיקום</th><th>MPH</th><th>קמ״ש</th></tr>
      <tr><td>🏘️ Residential / אזור מגורים</td><td>25</td><td>~40</td></tr>
      <tr><td>🏢 Business / אזור עסקי</td><td>25</td><td>~40</td></tr>
      <tr><td>🏫 School zone / אזור בית ספר</td><td>25</td><td>~40</td></tr>
      <tr><td>🚶 Alley / סמטה</td><td>15</td><td>~24</td></tr>
      <tr><td>🔲 Blind intersection / צומת עיוור</td><td>15</td><td>~24</td></tr>
      <tr><td>🚂 Railroad (no view) / מסילת רכבת</td><td>15</td><td>~24</td></tr>
      <tr><td>🛤️ Two-lane highway / כביש דו-נתיבי</td><td>55</td><td>~88</td></tr>
      <tr><td>🛣️ Freeway / כביש מהיר</td><td>65</td><td>~105</td></tr>
      <tr><td>🛣️ Some freeways / כבישים מהירים מסוימים</td><td>70</td><td>~113</td></tr>
    </table>
    <div class="explanation" style="margin-top:12px">
      <h4>💡 טיפ חשוב</h4>
      <p>בארה״ב המהירות נמדדת במיילים לשעה (mph). מייל אחד = 1.6 ק״מ. הכלל הפשוט: כפול ב-1.6 כדי לקבל קמ״ש.</p>
    </div>`;
}

function renderDistanceRef() {
  return `
    <table class="ref-table">
      <tr><th>Rule / כלל</th><th>Feet</th><th>מטרים</th></tr>
      <tr><td>🚂 Stop before railroad / עצור לפני מסילה</td><td>15 ft</td><td>~4.5 מ׳</td></tr>
      <tr><td>📏 Signal before turn / איתות לפני פניה</td><td>100 ft</td><td>~30 מ׳</td></tr>
      <tr><td>↩️ Center turn lane / נתיב פניה</td><td>200 ft</td><td>~60 מ׳</td></tr>
      <tr><td>🔥 Park from fire hydrant / חניה מהידרנט</td><td>15 ft</td><td>~4.5 מ׳</td></tr>
      <tr><td>🚂 Railroad view needed / שדה ראיה מסילה</td><td>400 ft</td><td>~120 מ׳</td></tr>
      <tr><td>🏫 School zone / אזור בית ספר</td><td>500-1000 ft</td><td>~150-300 מ׳</td></tr>
      <tr><td>💡 Headlight visibility / נראות פנסים</td><td>1000 ft</td><td>~300 מ׳</td></tr>
      <tr><td>🔊 Horn audibility / שמיעת צופר</td><td>200 ft</td><td>~60 מ׳</td></tr>
    </table>
    <div class="explanation" style="margin-top:12px">
      <h4>💡 טיפ חשוב</h4>
      <p>פוט אחד (foot) = כ-30 ס״מ. 100 פוט ≈ 30 מטר. 1000 פוט ≈ 300 מטר.</p>
    </div>`;
}

function renderCurbRef() {
  return `
    <table class="ref-table">
      <tr><th>Color / צבע</th><th>Meaning / משמעות</th></tr>
      <tr><td style="color:#ef4444;font-weight:700">🔴 Red / אדום</td><td>No stopping, standing, or parking / אסור לעצור, לעמוד, או לחנות</td></tr>
      <tr><td style="color:#eab308;font-weight:700">🟡 Yellow / צהוב</td><td>Loading/unloading only / פריקה וטעינה בלבד (לפעמים עם הגבלת זמן)</td></tr>
      <tr><td style="font-weight:700">⚪ White / לבן</td><td>5-minute passenger loading / עד 5 דקות להורדה והעלאת נוסעים</td></tr>
      <tr><td style="color:#22c55e;font-weight:700">🟢 Green / ירוק</td><td>Limited time parking / חניה מוגבלת בזמן (בדוק שלט)</td></tr>
      <tr><td style="color:#3b82f6;font-weight:700">🔵 Blue / כחול</td><td>Disabled parking only / חניית נכים בלבד (צריך תג)</td></tr>
    </table>`;
}

function renderBACRef() {
  return `
    <table class="ref-table">
      <tr><th>Driver Type / סוג נהג</th><th>BAC Limit</th><th>הסבר</th></tr>
      <tr><td>👤 21+ Regular / רגיל</td><td>0.08%</td><td>גבול אלכוהול בדם לנהג רגיל</td></tr>
      <tr><td>🧑 Under 21 / מתחת ל-21</td><td>0.01%</td><td>אפס סובלנות! כמעט כל כמות אסורה</td></tr>
      <tr><td>🚛 Commercial / מסחרי</td><td>0.04%</td><td>גבול מחמיר לנהגי משא ואוטובוס</td></tr>
      <tr><td>🚕 Rideshare / הסעות</td><td>0.04%</td><td>נהגי אובר/ליפט וכד׳</td></tr>
    </table>
    <div class="explanation" style="margin-top:12px">
      <h4>💡 מידע חשוב</h4>
      <p>בקליפורניה חל חוק "הסכמה משתמעת" (Implied Consent) — ברגע שיש לך רישיון נהיגה, הסכמת מראש לבדיקת אלכוהול. סירוב = השעיית רישיון מיידית.</p>
    </div>`;
}

function renderNav() {
  const items = [
    { screen: 'home', icon: '🏠', label: 'ראשי' },
    { screen: 'study', icon: '📚', label: 'לימוד' },
    { screen: 'test_start', icon: '📝', label: 'מבחן' },
    { screen: 'reference', icon: '📋', label: 'עזר' }
  ];
  return `
    <nav class="nav-bottom">
      ${items.map(item => `
        <button class="nav-btn ${state.screen === item.screen || (item.screen === 'test_start' && ['test','results','review'].includes(state.screen)) ? 'active' : ''}" 
          onclick="navigate('${item.screen}')">
          <span class="icon">${item.icon}</span>
          ${item.label}
        </button>
      `).join('')}
    </nav>`;
}

// Navigation
function navigate(screen) {
  if (state.testTimerId && screen !== 'test') {
    // Don't clear timer when navigating within test flow
    if (!['results', 'review'].includes(screen)) {
      clearInterval(state.testTimerId);
      state.testTimerId = null;
    }
  }
  state.screen = screen;
  state.studyAnswered = false;
  render();
  window.scrollTo(0, 0);
}

function setRefTab(tab) {
  state.refTab = tab;
  render();
}

// Study mode
function startStudy(cat) {
  state.studyCat = cat;
  state.studyIdx = 0;
  state.studyAnswered = false;
  state.screen = 'study_q';
  render();
}

function answerStudy(idx) {
  if (state.studyAnswered) return;
  state.studyAnswered = true;
  const questions = getCatQuestions(state.studyCat);
  const q = questions[state.studyIdx];
  markStudied(q.id);

  const options = document.querySelectorAll('#study-options .option');
  options.forEach((opt, i) => {
    opt.classList.add('disabled');
    if (i === q.a) opt.classList.add('correct');
    if (i === idx && idx !== q.a) opt.classList.add('wrong');
  });

  const expDiv = document.getElementById('study-explanation');
  expDiv.innerHTML = `
    <div class="explanation">
      <h4>💡 הסבר</h4>
      <p>${q.he}</p>
      ${q.tip ? `<div class="tip">💡 ${q.tip}</div>` : ''}
    </div>`;
}

function nextStudy() {
  const questions = getCatQuestions(state.studyCat);
  if (state.studyIdx < questions.length - 1) {
    state.studyIdx++;
    state.studyAnswered = false;
    render();
  } else {
    navigate('study');
  }
}

function prevStudy() {
  if (state.studyIdx > 0) {
    state.studyIdx--;
    state.studyAnswered = false;
    render();
  }
}

// Test mode
function startTest() {
  const shuffled = [...QUESTIONS].sort(() => Math.random() - 0.5);
  state.testQuestions = shuffled.slice(0, 46);
  state.testIdx = 0;
  state.testAnswers = [];
  state.testStartTime = Date.now();
  state.screen = 'test';

  if (state.testTimerId) clearInterval(state.testTimerId);
  state.testTimerId = setInterval(() => {
    const timer = document.getElementById('test-timer');
    if (timer) {
      const elapsed = Math.floor((Date.now() - state.testStartTime) / 1000);
      const mins = Math.floor(elapsed / 60);
      const secs = elapsed % 60;
      timer.textContent = `⏱ ${mins}:${secs.toString().padStart(2, '0')}`;
    }
  }, 1000);

  render();
}

function answerTest(idx) {
  if (state.testAnswers[state.testIdx] !== undefined) return;
  state.testAnswers[state.testIdx] = idx;
  const q = state.testQuestions[state.testIdx];

  const options = document.querySelectorAll('.options .option');
  options.forEach((opt, i) => {
    opt.classList.add('disabled');
    if (i === q.a) opt.classList.add('correct');
    if (i === idx && idx !== q.a) opt.classList.add('wrong');
  });

  // Re-render to show explanation and next button
  render();
}

function nextTest() {
  if (state.testIdx < 45) {
    state.testIdx++;
    render();
    window.scrollTo(0, 0);
  } else {
    // Save test result
    const correct = state.testAnswers.filter((ans, i) => ans === state.testQuestions[i].a).length;
    const pct = Math.round((correct / 46) * 100);
    state.progress.tests.push({ date: new Date().toISOString(), score: pct, correct, total: 46 });
    saveProgress();
    navigate('results');
  }
}

// Reset progress
function resetProgress() {
  if (confirm('האם אתה בטוח שברצונך לאפס את כל ההתקדמות?')) {
    state.progress = { studied: {}, tests: [] };
    saveProgress();
    navigate('home');
  }
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  render();
});

</script>
</body>
</html>
